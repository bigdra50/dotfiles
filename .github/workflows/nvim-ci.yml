name: Neovim CI

on:
  push:
    branches: [master]
    paths:
      - ".config/nvim/**"
      - "scripts/nvim-smoke-test.sh"
      - ".github/workflows/nvim-ci.yml"
  pull_request:
    paths:
      - ".config/nvim/**"
      - "scripts/nvim-smoke-test.sh"
      - ".github/workflows/nvim-ci.yml"

jobs:
  stylua:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup local tools
        run: |
          [[ -d "$HOME/.local/share/mise/shims" ]] && echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
          exit 0

      - name: Install stylua
        run: |
          if command -v stylua &>/dev/null; then
            echo "stylua already available: $(stylua --version)"
            exit 0
          fi
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  archive="stylua-linux-x86_64.zip" ;;
            Linux-aarch64) archive="stylua-linux-aarch64.zip" ;;
            Darwin-arm64)  archive="stylua-macos-aarch64.zip" ;;
            Darwin-x86_64) archive="stylua-macos-x86_64.zip" ;;
            *) echo "Unsupported platform"; exit 1 ;;
          esac
          # Pinned: stylua releases change default formatting between versions,
          # which silently breaks --check against code formatted by older ones
          curl -fsSL "https://github.com/JohnnyMorganz/StyLua/releases/download/v2.4.1/$archive" -o stylua.zip
          unzip -o stylua.zip -d /usr/local/bin
          rm stylua.zip

      - name: Check formatting
        run: stylua --check .config/nvim/

  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        neovim: [stable, nightly]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup local tools
        run: |
          [[ -d "$HOME/.local/share/mise/shims" ]] && echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"
          exit 0

      - name: Install Neovim
        env:
          NEOVIM_VERSION: ${{ matrix.neovim }}
        run: |
          if command -v nvim &>/dev/null; then
            echo "nvim already available: $(nvim --version | head -1)"
            exit 0
          fi
          version="${NEOVIM_VERSION:-stable}"
          case "$(uname -s)" in
            Linux)
              sudo apt-get update -qq && sudo apt-get install -y -qq jq bc
              archive="nvim-linux-x86_64"
              ;;
            Darwin)
              archive="nvim-macos-arm64"
              ;;
          esac
          curl -fsSL "https://github.com/neovim/neovim/releases/download/${version}/${archive}.tar.gz" -o nvim.tar.gz
          tar xzf nvim.tar.gz
          sudo cp -r "${archive}"/* /usr/local/
          rm -rf nvim.tar.gz "${archive}"
          nvim --version | head -1

      - name: Set XDG environment
        run: |
          workspace="${GITHUB_WORKSPACE:-$(pwd)}"
          tmpdir="${RUNNER_TEMP:-/tmp}"
          echo "XDG_CONFIG_HOME=${workspace}/.config" >> "$GITHUB_ENV"
          echo "XDG_DATA_HOME=${tmpdir}/nvim-data" >> "$GITHUB_ENV"
          echo "XDG_STATE_HOME=${tmpdir}/nvim-state" >> "$GITHUB_ENV"
          echo "XDG_CACHE_HOME=${tmpdir}/nvim-cache" >> "$GITHUB_ENV"

      - name: Install tree-sitter CLI
        # The swift treesitter parser is generated from grammar definitions on
        # install, which requires the tree-sitter CLI. Local machines rarely
        # hit this because parsers are already installed; CI cold caches do.
        run: npm install -g tree-sitter-cli

      - name: Smoke test (startup + module require)
        run: |
          source scripts/lib.sh
          FAILED=0

          info "Checking Neovim headless startup..."
          stderr_file=$(mktemp)
          if nvim --headless +"qall!" 2>"$stderr_file"; then
            errors=$(grep -viE '(^$|warning|deprecated|clipboard)' "$stderr_file" || true)
            if [[ -z "$errors" ]]; then
              success "Neovim starts without errors"
            else
              error "Neovim startup produced errors:"
              cat "$stderr_file" >&2
              FAILED=1
            fi
          else
            error "Neovim failed to start"
            cat "$stderr_file" >&2
            FAILED=1
          fi
          rm -f "$stderr_file"

          info "Checking module require..."
          for mod in plugins.ui plugins.lsp plugins.editor config.lazy; do
            stderr_file=$(mktemp)
            if nvim --headless +"lua require('$mod')" +"qall!" 2>"$stderr_file"; then
              success "require('$mod')"
            else
              error "require('$mod') failed"
              cat "$stderr_file" >&2
              FAILED=1
            fi
            rm -f "$stderr_file"
          done

          if [[ "$FAILED" -ne 0 ]]; then
            error "Some tests failed"
            exit 1
          fi
          success "All tests passed"
