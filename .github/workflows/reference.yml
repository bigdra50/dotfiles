name: Reference

on:
  push:
    branches: [master]
    paths:
      - ".wezterm.lua"
      - ".skhdrc"
      - ".config/zsh/**"
      - ".config/nvim/**"
      - ".config/mise/**"
      - "mise.toml"
      - ".claude/**"
      - "scripts/reference/**"
      - ".github/workflows/reference.yml"
  pull_request:
    paths:
      - ".wezterm.lua"
      - ".skhdrc"
      - ".config/zsh/**"
      - ".config/nvim/**"
      - ".config/mise/**"
      - "mise.toml"
      - ".claude/**"
      - "scripts/reference/**"
      - ".github/workflows/reference.yml"

permissions:
  contents: read

concurrency:
  group: reference-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned for stable `show-keys --lua` output format (parser depends on it)
  WEZTERM_VERSION: "20240203-110809-5046fc22"

jobs:
  build:
    # ubuntu-22.04 matches the pinned wezterm .deb target
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    outputs:
      counts: ${{ steps.build.outputs.counts }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache wezterm deb
        id: cache-wezterm
        uses: actions/cache@v6
        with:
          path: /tmp/wezterm.deb
          key: wezterm-deb-${{ env.WEZTERM_VERSION }}-ubuntu22.04

      - name: Download wezterm deb
        if: steps.cache-wezterm.outputs.cache-hit != 'true'
        run: |
          url="https://github.com/wez/wezterm/releases/download/${WEZTERM_VERSION}/wezterm-${WEZTERM_VERSION}.Ubuntu22.04.deb"
          curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors "$url" -o /tmp/wezterm.deb

      - name: Install wezterm
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq /tmp/wezterm.deb
          wezterm --version

      - name: Install Neovim
        run: |
          curl -fsSL --retry 3 --retry-delay 2 --retry-all-errors "https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.tar.gz" -o nvim.tar.gz
          tar xzf nvim.tar.gz
          sudo cp -r nvim-linux-x86_64/* /usr/local/
          rm -rf nvim.tar.gz nvim-linux-x86_64
          nvim --version | head -1

      - name: Set XDG environment
        run: |
          workspace="${GITHUB_WORKSPACE:-$(pwd)}"
          tmpdir="${RUNNER_TEMP:-/tmp}"
          echo "XDG_CONFIG_HOME=${workspace}/.config" >> "$GITHUB_ENV"
          echo "XDG_DATA_HOME=${tmpdir}/nvim-data" >> "$GITHUB_ENV"
          echo "XDG_STATE_HOME=${tmpdir}/nvim-state" >> "$GITHUB_ENV"
          echo "XDG_CACHE_HOME=${tmpdir}/nvim-cache" >> "$GITHUB_ENV"

      - name: Lint (ruff + mypy)
        # Install into the setup-python 3.14 env: pipx would run mypy under
        # the runner's system Python 3.10, where datetime.UTC does not exist
        run: |
          pip install --quiet ruff mypy
          ruff check scripts/reference/
          ruff format --check scripts/reference/
          mypy --strict scripts/reference/

      - name: Unit tests
        run: python -m unittest discover -s scripts/reference/tests -t scripts/reference

      - name: Build reference site
        id: build
        # XDG_CONFIG_HOME points mise at the repo config + global task dir so the
        # tasks catalog sees all tasks; trusting the configs avoids interactive prompts.
        env:
          MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}/mise.toml:${{ github.workspace }}/.config/mise/config.toml
        run: |
          bash scripts/reference/build_site.sh --out site/ | tee /tmp/build.log
          counts=$(grep -oE "\{[^}]*\}" /tmp/build.log | tail -1)
          echo "counts=$counts" >> "$GITHUB_OUTPUT"
          {
            echo "### Reference site built"
            echo ""
            echo "$counts"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

      - name: Summary
        run: |
          echo "### Deployed to GitHub Pages" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.deploy.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Counts: ${{ needs.build.outputs.counts }}" >> "$GITHUB_STEP_SUMMARY"
