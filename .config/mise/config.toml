# mise global configuration
# https://mise.jdx.dev/

[tools]
# Language runtimes
go = "latest"
rust = "latest"
node = "latest"
python = "3.14.2"  # 3.14.3 freethreaded-stripped ビルドに lib/ 欠落バグあり
ruby = "latest"
bun = "latest"
deno = "latest"

# CLI utilities
bat = "latest"
fd = "latest"
ripgrep = "latest"
fzf = "latest"
jq = "latest"
gron = "latest"
dust = "latest"
duf = "latest"
bottom = "latest"
lsd = "latest"
glow = "latest"
just = "latest"
zoxide = "latest"
delta = "latest"
difftastic = "latest"
starship = "latest"
atuin = "latest"
yazi = "latest"
carapace = "latest"
"cargo:mcat" = "latest"
"cargo:mdbook" = "latest"
"cargo:procs" = "latest"
"cargo:onefetch" = "latest"
"cargo:tokei" = "latest"

# Git/GitHub
gh = "latest"
lazygit = "latest"
ghq = "latest"

# Development
direnv = "latest"
"asdf:neovim" = "nightly"
cmake = "latest"
uv = "latest"

# Language runtimes (additional)
java = "openjdk-22"
julia = "1.10.4"

# Cloud/Platform
azure-cli = "latest"

# iOS/Swift
swiftlint = "latest"
cocoapods = "latest"
sourcery = "latest"
xcodegen = "latest"
xcbeautify = "latest"
xcodes = "latest"

# Network
"pipx:speedtest-cli" = "latest"
"ubi:sharkdp/hexyl" = "latest"
"ubi:sharkdp/hyperfine" = "latest"
"ubi:ducaale/xh" = "latest"
"aqua:charmbracelet/gum" = "latest"

# npm packages (formerly npm -g)
"npm:gitmoji-cli" = "latest"
"npm:jsonlint" = "latest"
"npm:openupm-cli" = "latest"
"npm:chrome-devtools-mcp" = "latest"
"npm:cline" = "latest"
"npm:difit" = "latest"
"npm:@evenrealities/evenhub-cli" = "latest"
"npm:@evenrealities/evenhub-simulator" = "latest"
"npm:@github/copilot" = "latest"
"npm:@marp-team/marp-cli" = "latest"
"npm:@openai/codex" = "latest"
"npm:@playwright/cli" = "latest"
"npm:markserv" = "latest"
"npm:pptxgenjs" = "latest"
"npm:sharp" = "latest"

# pipx packages
"pipx:git-filter-repo" = "latest"
"pipx:httpie" = "latest"
"pipx:pymobiledevice3" = "latest"
stylua = "latest"
swiftformat = "latest"
hk = "latest"
"github:rossmacarthur/sheldon" = "0.8.5"
"npm:oh-my-mermaid" = "latest"
"npm:agent-browser" = "latest"
pnpm = "10.28.1"
"pipx:claude-session-index" = "latest"
actionlint = "1.7.12"
shellcheck = "0.11.0"
# magi: fbprophet依存がビルド不可のためpipxで維持

[tasks.runner]
description = "Manage GitHub Actions self-hosted runners"
run = "~/.config/mise/tasks/runner {{arg(name=\"args\", var=true)}}"

[settings]
experimental = true
legacy_version_file = true
disable_backends = []
