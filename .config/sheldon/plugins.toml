shell = "zsh"

[templates]
defer = """{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source "{{ file }}"\n{% endfor %}{% if hooks?.post %}zsh-defer -c '{{ hooks?.post }}'\n{% endif %}"""

# --- core ---

[plugins.zsh-defer]
github = "romkatv/zsh-defer"

# --- plugins ---

[plugins.zsh-autocomplete]
github = "marlonrichert/zsh-autocomplete"
apply = ["source"]
# macOS のみで読み込む (extensions.zsh が macOS のとき SHELDON_PROFILE=macos を設定)。
# WSL(ConPTY) ではライブメニューの再描画が崩れて 1 打鍵ごとに表示が多重化するため外す。
# 実入力自体は正常だが、Tab 補完は fzf-tab、履歴ゴーストは zsh-autosuggestions が担う。
profiles = ["macos"]

[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"
apply = ["source"]

[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
apply = ["defer"]
hooks.post = "_zsh_autosuggest_start"

[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"
apply = ["defer"]

[plugins.zsh-256color]
github = "chrissicool/zsh-256color"
apply = ["defer"]

[plugins.claude-code-zsh-completion]
github = "1160054/claude-code-zsh-completion"

[plugins.zsh-abbr]
github = "olets/zsh-abbr"
apply = ["source"]
hooks.pre = "ABBR_DEFAULT_BINDINGS=0"
