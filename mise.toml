# Dotfiles setup tasks
# Usage: mise run setup           -- full setup
#        mise run setup:symlinks  -- symlinks only
#        mise run setup:symlinks ::: setup:neovim  -- parallel execution

[tasks."setup"]
description = "Full dotfiles setup"
depends = ["setup:base", "setup:platform-tools", "setup:symlinks", "setup:claude", "setup:neovim"]
run = 'echo "Setup complete."'

[tasks."setup:base"]
description = "Install base system packages"
dir = "{{cwd}}"
run = "bash scripts/setup/base.sh"

[tasks."setup:platform-tools"]
description = "Install platform-specific tools and mise runtimes"
depends = ["setup:base"]
dir = "{{cwd}}"
run = "bash scripts/setup/platform-tools.sh"

[tasks."setup:symlinks"]
description = "Create dotfile symlinks"
depends = ["setup:base"]
dir = "{{cwd}}"
raw = true
run = "bash scripts/setup/symlinks.sh"

[tasks."setup:claude"]
description = "Link Claude Code configuration"
depends = ["setup:symlinks"]
dir = "{{cwd}}"
raw = true
run = "bash scripts/setup/claude.sh"

[tasks."setup:neovim"]
description = "Setup Neovim Python/Node environments"
depends = ["setup:platform-tools"]
dir = "{{cwd}}"
run = "bash scripts/setup/neovim.sh"

[tasks."nvim:test"]
description = "Run Neovim smoke tests"
dir = "{{cwd}}"
run = "bash scripts/nvim-smoke-test.sh"

[tasks."nvim:fmt"]
description = "Check Neovim Lua formatting"
dir = "{{cwd}}"
run = "stylua --check .config/nvim/"

[tasks."nvim:fmt:fix"]
description = "Fix Neovim Lua formatting"
dir = "{{cwd}}"
run = "stylua .config/nvim/"

[tasks."nvim:ci"]
description = "Run Neovim CI locally (stylua via actrun + smoke test)"
dir = "{{cwd}}"
run = """
~/.local/bin/actrun workflow run .github/workflows/nvim-ci.yml --local --trust --job stylua
bash scripts/nvim-smoke-test.sh
"""

[tasks."sync-rules"]
description = "Sync .claude/rules/ to Codex/Copilot/Cursor formats"
dir = "{{cwd}}"
run = "bash scripts/sync-rules.sh --global"

[tasks."sync-rules:project"]
description = "Generate project-level rule files for Cursor/Copilot"
run = "bash scripts/sync-rules.sh --project ."

[tasks."keys"]
description = "Search keybindings interactively with fzf"
dir = "{{cwd}}"
run = "bash scripts/reference/search.sh"

[tasks."keys:build"]
description = "Extract keybindings from all tools into JSON"
dir = "{{cwd}}"
run = "bash scripts/reference/extract.sh"

[tasks."keys:check"]
description = "Validate keybinding schema, duplicates, and minimum counts"
dir = "{{cwd}}"
run = """
bash scripts/reference/extract.sh --out /tmp/keybindings-check.json
python scripts/reference/validate.py --input /tmp/keybindings-check.json
"""

[tasks."keys:html"]
description = "Render searchable keybindings HTML"
dir = "{{cwd}}"
run = """
bash scripts/reference/extract.sh --out /tmp/keybindings-html.json
python scripts/reference/render.py --domain keybindings --input /tmp/keybindings-html.json --html --out /tmp/keybindings-site/
echo "open /tmp/keybindings-site/index.html"
"""

[tasks."ref:lint"]
description = "Lint reference pipeline Python sources (ruff + mypy)"
dir = "{{cwd}}"
run = """
uvx ruff check scripts/reference/
uvx ruff format --check scripts/reference/
uvx mypy --strict scripts/reference/
"""

[tasks."ref:test"]
description = "Run reference pipeline unit tests"
dir = "{{cwd}}"
run = "python -m unittest discover -s scripts/reference/tests -t scripts/reference"

[tasks."sh:lint"]
description = "Lint shell scripts (shellcheck -S warning)"
dir = "{{cwd}}"
run = "mise x shellcheck@latest -- shellcheck -S warning scripts/*.sh scripts/setup/*.sh scripts/reference/*.sh"

[tasks."sh:fmt"]
description = "Check shell script formatting (shfmt)"
dir = "{{cwd}}"
run = "mise x shfmt@latest -- shfmt -d -i 4 -ci scripts/"

[tasks."sh:fmt:fix"]
description = "Fix shell script formatting (shfmt)"
dir = "{{cwd}}"
run = "mise x shfmt@latest -- shfmt -w -i 4 -ci scripts/"

[settings]
experimental = true
