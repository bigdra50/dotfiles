# Tool Management Configuration
# Supports: macOS, WSL-Ubuntu, PowerShell (Windows)
# Priority: Cross-platform tools > Platform-specific tools

# NOTE: CLI tools (bat, fd, ripgrep, lsd, dust, etc.) and language runtimes
# are managed by mise via .config/mise/config.toml.
# This file only defines platform-specific tools that mise cannot handle.

[platform.macos]
# macOS-specific tools (Homebrew)
brew = [
    # Window Management
    "koekeishiya/formulae/yabai",
    "koekeishiya/formulae/skhd",
    
    # macOS utilities
    "trash",
    "mas",  # Mac App Store CLI
    
    # Development tools
    "imagemagick",
]

brew_cask = [
    "wezterm",
    "font-hack-nerd-font",
    "font-jetbrains-mono-nerd-font",
]

[platform.wsl]
# WSL-specific tools (apt)
apt = [
    "build-essential",
    "curl",
    "git",
    "zsh",
    "dircolors",
    "wslu",  # WSL utilities for Windows integration
]

[platform.windows]
# Windows PowerShell environment
# Tools installed via scoop (https://scoop.sh/)
scoop_buckets = [
    "extras",
    "nerd-fonts",
]

scoop = [
    # Core tools
    "git",
    "gh",
    "fzf",
    "jq",
    "yq",
    
    # Terminal & Shell
    "windows-terminal",
    "oh-my-posh",
    
    # Development
    "neovim",
    "vscode",
    
    # Utilities
    "sudo",
    "which",
    "touch",
    "grep",
]

# Windows-specific tools (nushell via scoop or cargo)
# NOTE: On macOS/Linux, nushell can be added to mise config.toml if needed

# PowerShell modules
powershell_modules = [
    "PSReadLine",
    "posh-git",
    "Terminal-Icons",
    "z",  # zoxide alternative for PowerShell
]

[fallback]
# Special installations for tools that need custom setup
special = [
    { 
        name = "fzf", 
        condition = "!command -v fzf",
        install_unix = "git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf && ~/.fzf/install --all --no-bash --no-fish --no-update-rc",
        install_windows = "scoop install fzf"
    },
    {
        name = "wezterm",
        condition = "!command -v wezterm",
        install_macos = "brew install --cask wezterm",
        install_windows = "scoop install wezterm",
        install_wsl = "echo 'WezTerm runs on Windows host, not in WSL'"
    }
]

[shared]
# Configuration for tools that work differently across platforms
# NOTE: ghq root is environment-specific, configure via `git config --global ghq.root`
config = [
    {
        tool = "starship",
        settings = {
            config_path = "~/.config/starship.toml"  # Works on all platforms
        }
    }
]